apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-demo-api
  labels:
    app: kubernetes-demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubernetes-demo-api
  template:
    metadata: 
      labels:
        app: kubernetes-demo-api
    spec:            
      containers:
      - name: kubernetes-demo-api
        image: guilhermemarques18/kubernetes-demo-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"